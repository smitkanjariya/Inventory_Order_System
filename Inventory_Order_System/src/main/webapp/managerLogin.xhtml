<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html">

<h:head>
    <title>Manager Login - Inventory Order System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 450px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #f5576c;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .role-badge {
            display: inline-block;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .logo {
            text-align: center;
            font-size: 48px;
            margin-bottom: 15px;
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 8px;
            font-size: 28px;
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .auto-login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .auto-login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(245, 87, 108, 0.4);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-size: 14px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
            color: #2c3e50;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #f5576c;
            box-shadow: 0 0 0 4px rgba(245, 87, 108, 0.1);
        }

        .error-msg {
            background-color: #fee;
            color: #c33;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
            border-left: 4px solid #c33;
        }

        .credentials-box {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            font-size: 13px;
        }

        .credentials-box strong {
            display: block;
            margin-bottom: 8px;
            color: #495057;
        }

        .credentials-box code {
            display: block;
            background: white;
            padding: 8px 12px;
            border-radius: 6px;
            margin: 5px 0;
            font-family: 'Courier New', monospace;
            color: #f5576c;
            border: 1px solid #dee2e6;
        }
    </style>
</h:head>

<h:body>
    <div class="login-container">
        <a href="index.xhtml" class="back-link">&#8592; Back to Role Selection</a>
        
        <div style="text-align: center;">
            <span class="role-badge">&#128188; Manager</span>
        </div>

        <div class="logo">&#128188;</div>
        <h2>Manager Login</h2>
        <p class="subtitle">Manage products and handle requests</p>

        <h:form>
            <!-- Error Message -->
            <h:panelGroup rendered="#{not empty managerLoginBean.errorMessage}">
                <div class="error-msg">
                    <h:outputText value="#{managerLoginBean.errorMessage}"/>
                </div>
            </h:panelGroup>

            <!-- Email -->
            <div class="form-group">
                <label for="email">&#9993; Email Address</label>
                <h:inputText id="email" value="#{managerLoginBean.email}"
                             required="true"
                             requiredMessage="Email is required"
                             placeholder="Enter manager email"/>
                <h:message for="email" style="color:#c33; font-size:12px; margin-top:4px; display:block;"/>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label for="password">&#128274; Password</label>
                <h:inputSecret id="password" value="#{managerLoginBean.password}"
                               required="true"
                               requiredMessage="Password is required"
                               redisplay="false"
                               placeholder="Enter manager password"/>
                <h:message for="password" style="color:#c33; font-size:12px; margin-top:4px; display:block;"/>
            </div>

            <!-- Login Button -->
            <h:commandButton value="&#128274; Login as Manager" 
                             styleClass="auto-login-btn"
                             action="#{managerLoginBean.login()}"/>
        </h:form>

        <div class="credentials-box">
            <strong>&#128273; Demo Manager Credentials:</strong>
            <code>Email: manager@gmail.com</code>
            <code>Password: manager123</code>
        </div>
    </div>
</h:body>
</html>
