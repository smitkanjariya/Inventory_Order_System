<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:ui="jakarta.faces.facelets"
                template="/WEB-INF/templates/managerLayout.xhtml">

    <ui:param name="activeMenu" value="dashboard"/>

    <ui:define name="title">Dashboard -  Manager</ui:define>
    <ui:define name="pageTitle">Dashboard</ui:define>
    <ui:define name="pageSubtitle">
        Welcome back, <h:outputText value="#{userSession.name}"/>!
        <h:outputText value=" — #{managerBean.manager.organizationName}"
                      rendered="#{managerBean.orgNameSet}"/>
    </ui:define>

    <ui:define name="content">

        <!-- Org name alert -->
        <h:panelGroup rendered="#{!managerBean.orgNameSet}" layout="block">
            <div class="low-stock-alert">
                <span>&#9888;</span>
                <span>Your organization name is not set. Please update it below.</span>
            </div>
        </h:panelGroup>

        <!-- Stat cards -->
        <div class="stats-grid" style="grid-template-columns:repeat(3,1fr);">
            <div class="stat-card blue">
                <div class="stat-header">
                    <div>
                        <div class="stat-value"><h:outputText value="#{managerBean.productCount}"/></div>
                        <div class="stat-label">My Products</div>
                    </div>
                    <div class="stat-icon">&#128230;</div>
                </div>
            </div>
            <div class="stat-card orange">
                <div class="stat-header">
                    <div>
                        <div class="stat-value"><h:outputText value="#{managerBean.pendingRequestCount}"/></div>
                        <div class="stat-label">Pending Requests</div>
                    </div>
                    <div class="stat-icon">&#128203;</div>
                </div>
            </div>
            <div class="stat-card purple">
                <div class="stat-header">
                    <div>
                        <div class="stat-value">
                            <h:outputText value="#{managerBean.orgNameSet ? 'Set' : 'Not Set'}"/>
                        </div>
                        <div class="stat-label">Organization</div>
                    </div>
                    <div class="stat-icon">&#127970;</div>
                </div>
            </div>
        </div>

        <!-- Manager info + org name form -->
        <div class="form-card" style="margin-top:24px;">
            <div class="card-header">
                <div>
                    <div class="card-title">&#128100; Manager Profile</div>
                    <div class="card-subtitle">Your account details</div>
                </div>
            </div>

            <div class="form-grid" style="margin-bottom:20px;">
                <div class="form-group">
                    <label>Manager ID</label>
                    <input type="text" value="##{managerBean.manager.userId}" disabled="disabled"/>
                </div>
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" value="#{managerBean.manager.name}" disabled="disabled"/>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="text" value="#{managerBean.manager.email}" disabled="disabled"/>
                </div>
            </div>

            <hr style="border:none; border-top:1px solid #f1f5f9; margin-bottom:20px;"/>

            <h:form id="orgForm">
                <div class="card-title" style="margin-bottom:12px;">&#127970; Update Organization Name</div>
                <div class="form-grid" style="grid-template-columns:1fr auto; align-items:end;">
                    <div class="form-group">
                        <label>Organization Name *</label>
                        <h:inputText id="formOrgName"
                                     value="#{managerBean.formOrgName}"
                                     required="true"
                                     requiredMessage="Organization name is required!"
                                     maxlength="150"
                                    />
                        <h:message for="formOrgName" style="color:#ef4444; font-size:12px;"/>
                    </div>
                    <div class="form-group">
                        <h:commandButton value="&#10003; Save"
                                         action="#{managerBean.saveOrganization()}"
                                         styleClass="btn btn-primary">
                            <f:ajax execute="@form" render="@form growl"/>
                        </h:commandButton>
                    </div>
                </div>
            </h:form>
        </div>

        <!-- Quick actions -->
        <div class="section-card">
            <div class="section-header">
                <div>
                    <div class="section-title">Quick Actions</div>
                    <div class="section-subtitle">Common tasks</div>
                </div>
            </div>
            <div class="quick-actions">
                <a href="product.xhtml"   class="action-btn blue">  <span class="action-icon">&#128230;</span> Add Product</a>
                <a href="category.xhtml"  class="action-btn green"> <span class="action-icon">&#128193;</span> Add Category</a>
                <a href="requests.xhtml"  class="action-btn orange"><span class="action-icon">&#128203;</span> View Requests</a>
            </div>
        </div>

    </ui:define>

</ui:composition>
